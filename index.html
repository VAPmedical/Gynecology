<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<style>* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: flex-start; min-height: 100dvh; margin: 0; padding: 0; }
@media(min-width:500px){ body { align-items: center; } }
#app { display: flex; flex-direction: column; height: 100svh; width: 100%; max-width: 480px; border-radius: 0; overflow: hidden; background: #fff; direction: rtl; box-shadow: 0 4px 24px rgba(0,0,0,0.12); position: fixed; top: 0; left: 0; right: 0; bottom: 0; margin: auto; }
@media(min-width:500px){ #app { height: 660px; border-radius: 18px; position: relative; } }
#mode-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 28px 24px; gap: 16px; text-align: center; }
.mode-btn { width: 100%; padding: 15px 20px; border-radius: 14px; border: 1.5px solid #ddd; background: #fff; cursor: pointer; display: flex; align-items: center; gap: 14px; transition: all 0.15s; text-align: right; font-family: inherit; }
.mode-btn:hover { border-color: #1D9E75; background: #f0faf7; }
.mode-icon { font-size: 26px; flex-shrink: 0; }
.mode-title { font-size: 15px; font-weight: 600; color: #111; }
.mode-desc { font-size: 12px; color: #777; margin-top: 3px; line-height: 1.4; }
#chat-screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
#chat-screen.active { display: flex; }
#header { background: #f7f7f7; padding: 10px 16px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; position: sticky; top: 0; z-index: 10; }
.hinfo { display: flex; align-items: center; gap: 8px; }
#back-btn { display: none; background: none; border: none; cursor: pointer; font-size: 20px; color: #1D9E75; padding: 0 4px; line-height: 1; }
.dr-sm { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; object-position: top center; border: 2px solid #1D9E75; }
.htitle { font-size: 14px; font-weight: 600; color: #111; }
.hsub { font-size: 11px; color: #888; }
#mode-badge { font-size: 11px; background: #e6f7f1; color: #0F6E56; border-radius: 10px; padding: 4px 10px; font-weight: 500; cursor: pointer; border: none; font-family: inherit; }
#progress-bar { height: 3px; background: #eee; flex-shrink: 0; }
#progress-fill { height: 3px; background: #1D9E75; width: 0%; transition: width 0.4s; }
#avatar-area { display: none; flex-direction: column; align-items: center; padding: 0; gap: 0; border: none; background: transparent; flex-shrink: 0; position: relative; }
#avatar-area.visible { display: flex; }
#dr-img { width: 100%; height: 300px; object-fit: contain; object-position: center top; border-radius: 0; border: none; box-shadow: none; background: transparent; display: block; }
#avatar-area::after { content: ""; position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: linear-gradient(to bottom, transparent, #fff); pointer-events: none; }
.wave-row { display: flex; gap: 3px; align-items: center; height: 20px; }
.wb { width: 4px; border-radius: 3px; background: #1D9E75; transition: height 0.09s ease; }
#messages { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
.msg { max-width: 84%; display: flex; flex-direction: column; gap: 3px; }
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; }
.bubble { padding: 9px 13px; border-radius: 16px; font-size: 13.5px; line-height: 1.55; direction: rtl; text-align: right; }
.bot .bubble { background: #f0f0f0; color: #111; border-bottom-right-radius: 4px; }
.user .bubble { background: #1D9E75; color: #fff; border-bottom-left-radius: 4px; }
.section-label { font-size: 11px; color: #bbb; padding: 6px 0 2px; text-align: center; }
.msg-time { font-size: 11px; color: #bbb; padding: 0 3px; }
.msg.user .msg-time { text-align: left; }
#options-area { padding: 5px 14px 3px; display: flex; flex-direction: column; gap: 4px; max-height: 195px; overflow-y: auto; flex-shrink: 0; }
.opt-btn { background: #fff; border: 1px solid #e0e0e0; border-radius: 20px; padding: 7px 14px; font-size: 13px; color: #222; cursor: pointer; text-align: right; transition: background 0.12s; flex-shrink: 0; font-family: inherit; }
.opt-btn:hover { background: #f5f5f5; }
.opt-btn.selected { background: #e6f7f1; border-color: #1D9E75; color: #0F6E56; font-weight: 500; }
.opt-btn.open-btn { border-style: dashed; color: #999; font-size: 12px; }
.confirm-btn { background: #1D9E75; color: #fff; border: none; margin-top: 3px; }
#input-area { padding: 8px 10px 10px; border-top: 1px solid #eee; display: flex; gap: 6px; align-items: center; flex-direction: row-reverse; flex-shrink: 0; }
#user-input { flex: 1; border: 1px solid #ddd; border-radius: 22px; padding: 9px 14px; font-size: 13.5px; direction: rtl; text-align: right; font-family: inherit; background: #fafafa; }
#user-input:focus { outline: none; border-color: #1D9E75; background: #fff; }
#user-input:disabled { opacity: 0.4; }
#user-input.ltr-input { direction: ltr !important; text-align: left !important; }
#send-btn { width: 36px; height: 36px; border-radius: 50%; background: #1D9E75; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #fff; font-size: 17px; }
#send-btn:disabled { background: #ddd; cursor: default; color: #aaa; }
#mic-btn { width: 36px; height: 36px; border-radius: 50%; background: #f0f0f0; border: 1px solid #ddd; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 17px; }
#mic-btn.listening { background: #fff0ec; border-color: #e05530; animation: pulse 1s infinite; }
#mic-btn.off { opacity: 0.3; cursor: default; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
#typing { display: none; align-self: flex-start; }
#typing .bubble { padding: 9px 14px; }
.dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #aaa; margin: 0 2px; animation: bounce 1.2s infinite; }
.dot:nth-child(2){animation-delay:0.2s}.dot:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
#summary-view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
#summary-view.active { display: flex; }
#summary-content { flex: 1; overflow-y: auto; padding: 16px 18px; direction: rtl; text-align: right; font-size: 13.5px; line-height: 1.7; }
.sum-section { margin-bottom: 16px; }
.sum-section h3 { font-size: 11px; font-weight: 700; color: #0F6E56; border-bottom: 1.5px solid #1D9E75; padding-bottom: 4px; margin-bottom: 8px; }
.sum-section p { color: #222; white-space: pre-line; line-height: 1.65; }
#summary-footer { padding: 10px 14px; border-top: 1px solid #eee; display: flex; gap: 8px; flex-shrink: 0; }
.sum-btn { flex: 1; border-radius: 22px; padding: 9px; font-size: 13px; cursor: pointer; border: 1px solid #ddd; background: #fff; color: #333; font-family: inherit; }
.sum-btn.primary { background: #1D9E75; color: #fff; border: none; font-weight: 500; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

const GKEY="AIzaSyDPExYLndoep5cdn3rcg66mHhxo-qC1q_4";
const TTS_URL="https://texttospeech.googleapis.com/v1/text:synthesize?key="+GKEY;

// אלמנטים
const msgsEl=document.getElementById("messages");
const optsEl=document.getElementById("options-area");
const inp=document.getElementById("user-input");
const sendBtn=document.getElementById("send-btn");
const typingEl=document.getElementById("typing");
const pFill=document.getElementById("progress-fill");
const summaryView=document.getElementById("summary-view");
const summaryContent=document.getElementById("summary-content");
const chatInput=document.getElementById("input-area");
const chatScreen=document.getElementById("chat-screen");
const modeScreen=document.getElementById("mode-screen");
const modeBadge=document.getElementById("mode-badge");
const avatarArea=document.getElementById("avatar-area");
const micBtn=document.getElementById("mic-btn");
const backBtn=document.getElementById("back-btn");
const wEls=[1,2,3,4,5,6].map(i=>document.getElementById("w"+i));

const isIPhone=/iPhone/i.test(navigator.userAgent);
let collected={};
let claudeMessages=[];
let lastBotMsg=null;
let summaryText="";
let voiceMode=false;
let waveTimer=null;
let currentAudio=null;
let steps=[];
let currentStepIdx=-1;
let sessionToken=0; // משתנה בכל goBack
let chatStarted=false; // האם השאלון התחיל
let summaryDone=false; // האם הסיכום הוצג

window._answerFn = null;

// ─── sessionStorage — שמירה ושחזור ───────────────────────
const SS_KEY = "anamnesis_session";
function saveSession(){
  try{
    sessionStorage.setItem(SS_KEY, JSON.stringify({
      collected: collected,
      mode: window._dictateMode ? "dictate" : (voiceMode ? "listen" : "read"),
      ts: Date.now()
    }));
  }catch(e){}
}
function clearSession(){
  try{ sessionStorage.removeItem(SS_KEY); }catch(e){}
}
function loadSession(){
  try{
    const raw = sessionStorage.getItem(SS_KEY);
    if(!raw) return null;
    const data = JSON.parse(raw);
    // פג תוקף אחרי 2 שעות
    if(Date.now() - data.ts > 2*60*60*1000){ clearSession(); return null; }
    return data;
  }catch(e){ return null; }
}

// ─── מצב ─────────────────────────────────────────────────
function startModeIphone(type){
  // type = 'voice' (ללא כפתורים + מיקרופון) | 'text' (עם כפתורים)
  window._iphoneVoice = (type === 'voice');
  startMode('read');
}

function startMode(mode){
  chatStarted=true;
  window._dictateMode=(mode==="dictate");
  voiceMode=(mode==="listen");
  modeScreen.style.display="none";
  chatScreen.classList.add("active");
  // דחיפת state כדי לתפוס את כפתור חזור של הדפדפן
  history.pushState({inChat:true}, "");
  if(voiceMode){
    modeBadge.textContent="🔊 האזנה";
    avatarArea.classList.add("visible");
    if(window.speechSynthesis)window.speechSynthesis.getVoices();
    micBtn.style.display="flex";
    window._autoMic = true;
  } else if(window._dictateMode){
    modeBadge.textContent="🎤 הכתבה";
    micBtn.style.display="flex";
    window._autoMic = true;
  } else {
    modeBadge.textContent="👁️ קריאה";
    if(isIPhone) micBtn.style.display="none";
    window._autoMic = true; // מיקרופון אוטומטי גם במצב קריאה
  }
  resetMic();
  setupSTT();
  start();
}

function toggleMode(){
  voiceMode=!voiceMode;
  modeBadge.textContent=voiceMode?"🔊 האזנה":"👁️ קריאה";
  if(voiceMode){avatarArea.classList.add("visible");}
  else{avatarArea.classList.remove("visible");if(currentAudio){currentAudio.pause();currentAudio=null;}stopWaves();}
}

// ─── חזרה ────────────────────────────────────────────────
function goBack(){
  if(currentStepIdx<=0) return;
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  stopWaves();
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  // עצור מיקרופון אם פעיל — יוחזר אוטומטית עם השאלה הבאה
  if(micBtn._rec){try{micBtn._rec.stop();}catch(e){}micBtn._rec=null;}
  micBtn.classList.remove("listening");
  micBtn.style.display="flex";
  window._answerFn=null;
  sessionToken++;
  currentStepIdx--; // עכשיו מצביע על השלב הנוכחי
  currentStepIdx--; // עכשיו מצביע על השלב שלפניו
  const prev=steps[currentStepIdx+1]; // השלב שרוצים לחזור אליו
  const target=steps[currentStepIdx]; // נקודת ההתחלה (msgCount)
  collected=JSON.parse(JSON.stringify(prev.snapshot));
  const targetMsgCount=prev.msgCount;
  while(msgsEl.children.length>targetMsgCount){
    const last=msgsEl.lastChild;if(last===typingEl)break;
    msgsEl.removeChild(last);
  }
  clearOpts();lock();
  currentStepIdx--; // pushStep יוסיף אחד
  backBtn.style.display=currentStepIdx>0?"inline-block":"none";
  const bb=document.getElementById("back-bar");if(bb)bb.style.display=currentStepIdx>0?"block":"none";
  steps=steps.slice(0,currentStepIdx+1);
  prev.run();
  // אפס maxLength ו-ltr-input שאולי נשארו מת"ז
  setTimeout(()=>{
    setupSTT();
    if(inp.maxLength!==524288 && !inp.classList.contains("ltr-input")){
      inp.maxLength=524288;
    }
  },400);
}

// ─── TTS ─────────────────────────────────────────────────
async function speak(text){
  if(!voiceMode) return;
  if(micBtn.classList.contains("listening")) return; // לא לדבר כשמיקרופון פעיל
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  const ttsText=text.length>120?text.substring(0,120):text;
  try{
    const res=await fetch(TTS_URL,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({input:{text:ttsText},voice:{languageCode:"he-IL",name:"he-IL-Wavenet-A",ssmlGender:"FEMALE"},
      audioConfig:{audioEncoding:"MP3",speakingRate:0.92,pitch:2.0}})});
    const data=await res.json();
    if(!data.audioContent) return;
    const audio=new Audio("data:audio/mp3;base64,"+data.audioContent);
    currentAudio=audio;
    return new Promise(resolve=>{
      const t=setTimeout(()=>{stopWaves();currentAudio=null;resolve();},15000);
      audio.onplay=()=>startWaves();
      audio.onended=()=>{clearTimeout(t);stopWaves();currentAudio=null;resolve();};
      audio.onerror=()=>{clearTimeout(t);stopWaves();currentAudio=null;resolve();};
      audio.play().catch(()=>{clearTimeout(t);resolve();});
    });
  }catch(e){console.error("TTS:",e);}
}

// ─── STT ─────────────────────────────────────────────────
function setupSTT(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){micBtn.classList.add("off");return;}
  if(micBtn._sttReady) return;
  micBtn._sttReady=true;
  micBtn.onclick=()=>{
    if(micBtn.classList.contains("off")) return;
    if(micBtn.classList.contains("listening")){
      if(micBtn._rec){try{micBtn._rec.stop();}catch(e){}}
      micBtn._rec=null;micBtn.classList.remove("listening");
      return;
    }
    if(currentAudio){try{currentAudio.pause();}catch(e){}currentAudio=null;}
    stopWaves();
    const r=new SR();
    micBtn._rec=r;
    r.lang="he-IL";r.continuous=false;r.interimResults=false;
    r.onresult=e=>{
      let transcript=e.results[0][0].transcript.trim();
      // תיקון שגיאות זיהוי קול נפוצות בהקשר גינקולוגי
      transcript=fixMedicalSTT(transcript);
      micBtn.classList.remove("listening");micBtn._rec=null;
      if(window._answerFn){
        window._answerFn(transcript);
      } else {
        // fallback -- כתוב לשדה
        inp.value=transcript;
      }
    };
    r.onend=()=>{micBtn.classList.remove("listening");micBtn._rec=null;};
    r.onerror=()=>{micBtn.classList.remove("listening");micBtn._rec=null;};
    try{r.start();micBtn.classList.add("listening");}
    catch(e){micBtn.classList.remove("listening");micBtn._rec=null;}
  };
  window._doRecord=micBtn.onclick;
}

// ─── המרת מספרים ─────────────────────────────────────────
function hebrewToDigits(text){
  const map={
    "אפס":"0","אחת":"1","אחד":"1",
    "שתיים":"2","שניים":"2","שתי":"2","שני":"2","שניה":"2",
    "שלושה":"3","שלוש":"3","שלש":"3",
    "ארבעה":"4","ארבע":"4",
    "חמישה":"5","חמש":"5",
    "ששה":"6","שש":"6",
    "שבעה":"7","שבע":"7",
    "שמונה":"8","תשעה":"9","תשע":"9",
    "עשרה":"10","עשר":"10",
    "אחד עשר":"11","אחת עשרה":"11",
    "שתים עשרה":"12","שנים עשר":"12",
    "שלוש עשרה":"13","שלושה עשר":"13",
    "ארבע עשרה":"14","ארבעה עשר":"14",
    "חמש עשרה":"15","חמישה עשר":"15",
    "שש עשרה":"16","שישה עשר":"16",
    "שבע עשרה":"17","שבעה עשר":"17",
    "שמונה עשרה":"18","שמונה עשר":"18",
    "תשע עשרה":"19","תשעה עשר":"19",
    "עשרים":"20",
    "עשרים ואחת":"21","עשרים ואחד":"21",
    "עשרים ושתיים":"22","עשרים ושניים":"22",
    "עשרים ושלוש":"23","עשרים ושלושה":"23",
    "עשרים וארבע":"24","עשרים וארבעה":"24",
    "עשרים וחמש":"25","עשרים וחמישה":"25",
    "עשרים ושש":"26","עשרים ושישה":"26",
    "עשרים ושבע":"27","עשרים ושבעה":"27",
    "עשרים ושמונה":"28","עשרים ותשע":"29",
    "שלושים":"30","ארבעים":"40","חמישים":"50",
    "שישים":"60","שבעים":"70","שמונים":"80","תשעים":"90"
  };
  let result=text;
  Object.keys(map).sort((a,b)=>b.length-a.length).forEach(w=>{
    result=result.replace(new RegExp(w,"g"),map[w]);
  });
  result=result.replace(/([0-9])[א-ת]+/g,"$1");
  result=result.replace(/([0-9])\s+([0-9])/g,"$1$2");
  result=result.replace(/([0-9])\s+([0-9])/g,"$1$2");
  return result;
}

// ─── תיקון שגיאות זיהוי קול נפוצות בהקשר גינקולוגי ────────
function fixMedicalSTT(text){
  if(!text) return text;
  let t = text;
  // PAP — תיקון וריאציות שגויות (\b לא עובד עם עברית — משתמשים ב-(?:^|\s|,)
  const papVariants = [/פאפע/g, /פאפ/g, /פפ/g, /פאי פי/g, /פיפי/g, /פאיפאי/g, /PAPE/gi];
  papVariants.forEach(p => { t = t.replace(p, "PAP"); });
  // רחם — תיקון "רכב" (רק כמילה שלמה)
  t = t.replace(/(^|\s)רכב(\s|$|,|\.)/g, "$1רחם$2");
  // הכתמות
  t = t.replace(/החתמות/g, "הכתמות");
  t = t.replace(/החתמה/g, "הכתמה");
  return t;
}

// ─── ניקוי קלט תעודת זהות ────────────────────────────────
function cleanIdInput(raw){
  let t = raw.trim();
  // ספרות ערביות-מזרחיות -> רגילות
  t = t.replace(/[\u0660-\u0669]/g, d => String(d.charCodeAt(0) - 0x0660));
  // הסר פסיקי אלפים ונקודות בין ספרות (7,002,200 → 7002200)
  t = t.replace(/([0-9])[,.]([0-9])/g, "$1$2");

  // אם הטקסט מכיל ספרות בכלל — קח רק אותן, התעלם ממילים עבריות שמסביב
  // (Speech Recognition בעברית עם תעודת זהות בד"כ מחזיר ספרות ממש)
  const digitsOnly = t.replace(/[^0-9]/g, "");
  if(digitsOnly.length >= 2) return digitsOnly;

  // אין ספרות כלל — נסה המרה ממילים עבריות
  const converted = hebrewToDigits(t).replace(/[^0-9]/g, "");
  return converted;
}

    await addMsg(q,"bot");clearOpts();lock();await wait(50);
    const yes=()=>{collected["cs_births"]=String(cs);addMsg("כן, נכון","user");lock();clearOpts();window._answerFn=null;q_cycle();};
    const no=()=>{addMsg("לא, תקני","user");clearOpts();unlock("כמה ניתוחים קיסריים?");scrollQ();
      window._answerFn=(t)=>{addMsg(t,"user");lock();collected["cs_births"]=hebrewToDigits(t).replace(/[^0-9]/g,"")||t;window._answerFn=null;q_cycle();};
      const gF=()=>{const v=inp.value.trim();if(!v)return;addMsg(v,"user");lock();collected["cs_births"]=v;q_cycle();};
      sendBtn.onclick=gF;inp.onkeydown=e=>{if(e.key==="Enter")gF();};};
    window._answerFn=(t)=>{const tl=t.toLowerCase();if(tl.includes("כן")||tl.includes("נכון")||tl.includes("בהחלט"))yes();else no();};
    const yb=document.createElement("button");yb.className="opt-btn";yb.textContent="כן, נכון";yb.onclick=yes;optsEl.appendChild(yb);
    const nb=document.createElement("button");nb.className="opt-btn";nb.textContent="לא, תקני";nb.onclick=no;optsEl.appendChild(nb);
    await wait(40);scrollQ();
  })();
}

function askLMP(){
  const run=()=>{
    pushStep("lmp",run);
    (async()=>{
      showTyp(true);await wait(300);showTyp(false);
      await addMsg("מתי היה היום הראשון של הווסת האחרון?","bot");clearOpts();lock();await wait(50);
      const done=(v)=>{collected["lmp"]=v;lock();clearOpts();window._answerFn=null;q_contraception();};
      window._answerFn=(t)=>{t=fixMedicalSTT(t);addMsg(t,"user");done(t);};
      // iPhone + מצב קולי — שדה פתוח בלבד
      if(isIPhone && window._iphoneVoice !== false){
        unlock("למשל: 1.5.2025");scrollQ();
        const go=()=>{const v=inp.value.trim();if(!v)return;addMsg(v,"user");done(v);};
        sendBtn.onclick=go;inp.onkeydown=e=>{if(e.key==="Enter")go();};
        autoStartMic();
        await wait(40);scrollQ();
        return;
      }
      const mb=document.createElement("button");mb.className="opt-btn";mb.textContent="לאחר גיל המעבר";mb.onclick=()=>{addMsg("לאחר גיל המעבר","user");done("לאחר גיל המעבר");};optsEl.appendChild(mb);
      const dr=document.createElement("button");dr.className="opt-btn";dr.textContent="לא זוכרת בדיוק";
      dr.onclick=()=>{addMsg("לא זוכרת בדיוק","user");done("לא זוכרת");};
      optsEl.appendChild(dr);
      // שדה פתוח לתאריך חופשי
      unlock("למשל: 1.5.2025");scrollQ();
      window._answerFn=(t)=>{t=fixMedicalSTT(t);addMsg(t,"user");done(t);};
      const go=()=>{const v=inp.value.trim();if(!v)return;addMsg(v,"user");done(v);};
      sendBtn.onclick=go;inp.onkeydown=e=>{if(e.key==="Enter")go();};await wait(40);scrollQ();
    })();
  };
  run();
}

function q_children(){askOpts("האם יש ילדים?","has_children",["כן","לא"],v=>{
  const t=fixMedicalSTT((v||"").trim());
  const numWords="אחד|אחת|שני|שתי|שניים|שתיים|שלושה|שלוש|ארבעה|ארבע|חמישה|חמש|ששה|שש|שבעה|שבע|שמונה|תשעה|תשע|עשרה|עשר";
  const hasNumber=new RegExp("(\\d+|"+numWords+")","i").test(t);
  // זיהוי חיוב מפורש — רק אם זיהינו "כן" ברור נשאל כמה
  const clearYes=/^(כן|יש|בהחלט|וודאי|כן יש|yes)/i.test(t);
  if(hasNumber){
    // כבר אמרה כמה — שמור ישר
    const digits=cleanIdInput(t);
    const wordMap={"אחד":1,"אחת":1,"שני":2,"שתי":2,"שניים":2,"שתיים":2,"שלושה":3,"שלוש":3,"ארבעה":4,"ארבע":4,"חמישה":5,"חמש":5,"ששה":6,"שש":6,"שבעה":7,"שבע":7,"שמונה":8,"תשעה":9,"תשע":9,"עשרה":10,"עשר":10};
    let count=digits||"";
    if(!count){for(const [w,n] of Object.entries(wordMap)){if(t.includes(w)){count=String(n);break;}}}
    collected["has_children"]="כן";
    collected["children_count"]=count||t;
    q_pregnancies();
  } else if(clearYes){
    // כן ברור — שאל כמה
    collected["has_children"]="כן";
    q_childrenCount();
  } else {
    // כל שאר המקרים (לא, ריק, שקט, לא ברור) — אין ילדים
    collected["has_children"]="לא";
    q_pregnancies();
  }
});}

  );
}
function isYes(v){

  return ["כן","יש","כן יש","yes"].some(w=>

  );

function normalizeComplaint(c){
  if(!c) return c;
  const t = c.trim();
  // זיהוי ניתוח / היסטרוסקופיה
  if(/היסטרוסקופ|ביופסי|פוליסקטומ|כריתת פוליפ|הסרת פוליפ|הסרת מיומ|כריתת מיומ|ניתוח|לפרוסקופ|רחם|אבחון|בירור ניתוח/i.test(t))
    return "צורך בניתוח / היסטרוסקופיה";
  // זיהוי פוריות
  if(/פוריות|הריון|להרות|להיכנס להריון|אי פריון|ivf|הפריה/i.test(t))
    return "בעיית פוריות";
  // זיהוי בדיקה שגרתית
  if(/שגרתי|מניעתי|בריאות|סקירה|פאפ|ממוגרפיה|גינקולוג שגרתי/i.test(t))
    return "בדיקה שגרתית / מניעתית";
  return t;
}

function drillComplaint(c,pfx,next){
  c = normalizeComplaint(c);
  if(c==="בעיית פוריות"){drillFertility(pfx,next);return;}
  if(c==="צורך בניתוח / היסטרוסקופיה"){drillSurgeryNeed(pfx,next);return;}
  if(c==="בדיקה שגרתית / מניעתית"){next();return;}
  // אם "אחר" — שאלי קודם מה הסיבה
  if(c==="אחר"||c==="אחר..."){
    askFree("מה הסיבה לביקור?",pfx+"complaint_detail","תארי בחופשיות...",()=>{
      const detail=collected[pfx+"complaint_detail"]||"";
      const norm=normalizeComplaint(detail);
      if(norm&&norm!==detail) c=norm;
      else c=detail;
      drillComplaint(c,pfx,next);
    });
    return;
  }
  askOpts("כמה זמן זה קיים?",pfx+"duration",["פחות משבוע","שבועיים עד חודש","1–3 חודשים","יותר מ-3 חודשים","חוזר ונשנה"],()=>{
    if(c&&(c.includes("דימום")||c.includes("אי-סדירות")))
      askOpts("מה כמות הדימום?",pfx+"bleeding_amount",["מועטה — כתמים בלבד","בינונית","רבה — יותר מפד לשעה","משתנה"],()=>afterBleeding(c,pfx,next));
    else afterBleeding(c,pfx,next);
  });
}
function afterBleeding(c,pfx,next){
  if(c&&c.includes("כאבי בטן")) drillPain(pfx,()=>afterPain(c,pfx,next));
  else afterPain(c,pfx,next);
}
function afterPain(c,pfx,next){
  askOpts("האם קרה בעבר?",pfx+"history",["לא, זו הפעם הראשונה","כן, בעבר הרחוק","כן, זה חוזר ונשנה"],()=>{
    askOpts("האם בוצע בירור רפואי בנושא?",pfx+"workup",["לא","כן, אצל רופאת משפחה","כן, אצל גינקולוגית","כן, בוצעו בדיקות"],v=>{
      const workupDone = !isNo(v) && v && /כן|בוצע|אצל|בדיקות/i.test(v);
      if(workupDone) askFree("מה נמצא בבדיקות?",pfx+"workup_findings","תארי בחופשיות...",()=>afterWorkup(c,pfx,next));
      else afterWorkup(c,pfx,next);
    });
  });
}
function afterWorkup(c,pfx,next){
  if(c&&c.includes("לאחר יחסים")){
    askOpts("האם יש תשובת פאפ עדכנית?",pfx+"pap_status",["כן, תקין","כן, היה ממצא","לא עשיתי לאחרונה","לא זוכרת"],()=>{
      askOpts("האם יש תשובת פפילומה עדכנית?",pfx+"hpv_status",["כן, שלילי","כן, חיובי","לא","לא זוכרת"],()=>{
        askOpts("האם מחוסנת נגד פפילומה?",pfx+"hpv_vaccine",["כן","לא","לא יודעת"],()=>next());
      });
    });
  } else next();
}
function drillPain(pfx,next){
  askOpts("היכן ממוקם הכאב?",pfx+"pain_location",["בטן תחתונה — מרכז","בטן תחתונה — ימין","בטן תחתונה — שמאל","בטן עליונה","מפושט","גב תחתון / אגן"],()=>{
    askOpts("האם הכאב רציף או בא והולך?",pfx+"pain_pattern",["רציף","בא והולך","משתנה"],()=>{
      askMulti("מה אופי הכאב?",pfx+"pain_character",["לוחץ","דקירות","שורף","עוויתות","עמום"],()=>{
        askMulti("האם הכאב קשור לווסת?",pfx+"pain_cycle",["כאב בזמן הווסת","לפני הווסת","באמצע המחזור","מוחמר בווסת","לא קשור לווסת"],()=>{
          const cs=collected[pfx+"pain_cycle"]||"";
          if(cs.includes("בזמן")||cs.includes("מוחמר")){
            askOpts("האם יש כאב בקיום יחסי מין?",pfx+"pain_dyspareunia",["כן, תמיד","כן, לפעמים","לא","לא פעילה מינית"],()=>{
              askMulti("שינויים ביציאות/שתן בווסת?",pfx+"endo_bowel",["כאב ביציאות","שלשולים","עצירות","דם ביציאות","כאב בשתן","אין שינויים"],()=>{
                askOpts("האם בוצע בירור לאנדומטריוזיס?",pfx+"endo_workup",["לא","כן — אולטרסאונד","כן — לפרוסקופיה","כן — ואובחנה","אחר"],()=>next());
              });
            });
          } else {
            askOpts("האם הכאב מוחמר בקיום יחסי מין?",pfx+"pain_dyspareunia",["כן","לא","לא פעילה מינית"],()=>next());
          }
        });
      });
    });
  });
}
function drillSurgeryNeed(pfx,next){
  askOpts("מה הסיבה להיסטרוסקופיה / לניתוח?",pfx+"surgery_reason",["פוליפ","מיומה","רירית מעובה","שארית רקמה","ציסטה בשחלה","אנדומטריוזיס","בעיית פוריות","צניחת אברי האגן","בדיקה ואבחון","אחר"],v=>{
    // מיפוי לתלונות מוכרות — נכנסים לעץ השאלות המתאים
    const reasonMap = {
      "פוליפ":           "דימום חריג",
      "מיומה":           "דימום חריג",
      "רירית מעובה":    "דימום חריג",
      "שארית רקמה":     "דימום חריג",
      "ציסטה בשחלה":   "כאבי בטן / אגן",
      "אנדומטריוזיס":  "כאבי בטן / אגן",
      "בעיית פוריות":  "בעיית פוריות",
    };
    const mapped = reasonMap[v];
    if(mapped){
      // כנסו לעץ השאלות המתאים לתלונה, אבל next() הוא המשך הרגיל
      drillComplaint(mapped, pfx, next);
    } else {
      // בדיקה ואבחון / צניחה / אחר — שאלות שגרה בסיסיות
      askOpts("כמה זמן ידוע על הממצא?",pfx+"duration",["פחות מחודש","1–3 חודשים","3–6 חודשים","יותר מחצי שנה","לא ידוע"],()=>{
        askOpts("האם בוצע בירור רפואי?",pfx+"workup",["לא","כן, אצל רופאת משפחה","כן, אצל גינקולוגית","כן, בוצעו בדיקות"],w=>{
          const wDone = !isNo(w) && w && /כן|בוצע|אצל|בדיקות/i.test(w);
          if(wDone) askFree("מה נמצא בבדיקות?",pfx+"workup_findings","תארי בחופשיות...",()=>next());
          else next();
        });
      });
    }
  });
}
function drillFertility(pfx,next){
  askOpts("כמה זמן מנסה להרות?",pfx+"fertility_duration",["פחות מ-6 חודשים","6–12 חודשים","שנה עד שנתיים","יותר מ-2 שנים"],()=>{
    askMulti("איזה בירור פוריות בוצע?",pfx+"fertility_workup",["לא בוצע בירור","בדיקות דם","אולטרסאונד","סונר תלת-ממדי","צילום רחם","בדיקת זרע","בדיקות מלאות","אחר"],()=>{
      askOpts("האם בוצעו טיפולי פוריות?",pfx+"fertility_treatment",["כן","לא"],v=>{
        if(v==="כן") askFree("אמרי אילו טיפולים בוצעו",pfx+"fertility_treatment_details","תארי...",next);
        else next();
      });
    });
  });
}

function q_extraComplaint(){
  setProg(82);
  (async()=>{
    showTyp(true);await wait(300);showTyp(false);
    await addMsg("האם יש סיבות נוספות לביקור היום?","bot");clearOpts();lock();await wait(50);
    const done=async(v)=>{await addMsg(v||"אין תלונות נוספות","user");lock();clearOpts();window._answerFn=null;
      if(v){collected["extra_complaint"]=v;addLabel("— פירוט: "+v+" —");drillComplaint(v,"c2_",q_claudeQ);}
      else q_claudeQ();
    };
    window._answerFn=(t)=>{
      const tl=t.toLowerCase();
      const negative=["לא","אין","טוב","סבבה","בסדר","שום דבר","לא ממש","לא יש","הכל בסדר","לא רוצה","לא נראה לי"];
      if(negative.some(w=>tl===w||tl.includes(w))) done(null);
      else done(t);
    };
    // iPhone + מצב קולי — שדה פתוח בלבד
    if(isIPhone && window._iphoneVoice !== false){
      unlock("אמרי או כתבי תשובתך...");scrollQ();
      const gF=()=>{const v=inp.value.trim();if(!v)return;done(v);};
      sendBtn.onclick=gF;inp.onkeydown=e=>{if(e.key==="Enter")gF();};
      autoStartMic();
      await wait(40);scrollQ();
      return;
    }
    const nb=document.createElement("button");nb.className="opt-btn";nb.textContent="אין תלונות נוספות";nb.onclick=()=>done(null);optsEl.appendChild(nb);
    COMPLAINTS.forEach(o=>{if(o===collected.main_complaint)return;
      const btn=document.createElement("button");btn.className="opt-btn";btn.textContent=o;btn.onclick=()=>done(o);optsEl.appendChild(btn);});
    const ob=document.createElement("button");ob.className="opt-btn open-btn";ob.innerHTML="✏️ רוצה לפרט בחופשיות";
    ob.onclick=()=>{if(ob.classList.contains("active")){ob.classList.remove("active");ob.innerHTML="✏️ רוצה לפרט בחופשיות";lock();window._answerFn=(t)=>done(t);}
      else{ob.classList.add("active");ob.innerHTML="✖ חזרי לאפשרויות";unlock("כתבי בחופשיות...");scrollQ();
        window._answerFn=(t)=>done(t);
        const gF=()=>{const v=inp.value.trim();if(!v)return;done(v);};
        sendBtn.onclick=gF;inp.onkeydown=e=>{if(e.key==="Enter")gF();};}};
    optsEl.appendChild(ob);await wait(40);scrollQ();
  })();
}

async function q_claudeQ(){
  setProg(88);addLabel("— שאלות נוספות —");showTyp(true);
  const sys="את עוזרת רפואית של רופאת נשים. אלו הנתונים: "+JSON.stringify(collected,null,2)+". שאלי שאלת המשך קצרה ורגישה בעברית, בלשון נקבה. שאלה אחת בלבד.";
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:[{role:"user",content:"שאלי שאלת המשך."}]})});
    const data=await res.json();const text=(data.content||[]).find(b=>b.type==="text")?.text||"";
    showTyp(false);
    if(text){
      await addMsg(text,"bot");claudeMessages.push({role:"assistant",content:text});
      clearOpts();unlock("ספרי בחופשיות...");scrollQ();
      window._answerFn=(t)=>{addMsg(t,"user");lock();claudeMessages.push({role:"user",content:t});window._answerFn=null;q_notes();};
      const go=()=>{const v=inp.value.trim();if(!v)return;addMsg(v,"user");lock();claudeMessages.push({role:"user",content:v});q_notes();};
      sendBtn.onclick=go;inp.onkeydown=e=>{if(e.key==="Enter")go();};
    } else{showTyp(false);q_notes();}
  }catch{showTyp(false);q_notes();}
}
function q_notes(){
  (async()=>{
    showTyp(true);await wait(300);showTyp(false);
    await addMsg("אם יש עוד מידע חשוב לרופאה, כתבי כאן בבקשה","bot");
    clearOpts();await wait(30);unlock("כתבי כאן...");scrollQ();

    const done=(v)=>{lock();clearOpts();collected["extra_notes"]=v||"";showFinal();};

    window._answerFn=(t)=>{addMsg(t,"user");done(t);};

    // כפתור שליחה מיידית
    const sb=document.createElement("button");sb.className="opt-btn confirm-btn";
    sb.textContent="📋 שליחת סיכום לרופאה";
    sb.onclick=()=>{collected["extra_notes"]="";lock();clearOpts();showFinal();};
    optsEl.appendChild(sb);

    // כפתור המשך ללא הערות
    const nb=document.createElement("button");nb.className="opt-btn open-btn";
    nb.textContent="המשיכי ללא הערות";
    nb.onclick=()=>done("");
    optsEl.appendChild(nb);

    await wait(30);scrollQ();
    const go=()=>{const v=inp.value.trim();if(!v)return;addMsg(v,"user");done(v);};
    sendBtn.onclick=go;inp.onkeydown=e=>{if(e.key==="Enter")go();};
  })();
}
function earlyFinish(){
  if(!confirm("האם לסיים את השאלון ולשלוח את המידע שנאסף עד כה?")) return;
  // עצור הכל מיד
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  stopWaves();
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  if(micBtn._rec){try{micBtn._rec.stop();}catch(e){}micBtn._rec=null;}
  micBtn.classList.remove("listening");
  window._answerFn=null;
  sessionToken++; // בטל כל שאלה פעילה
  clearOpts();lock();
  // עבור ישירות לסיכום
  showSummary();
}

function buildObs(){
  const G=parseInt(hebrewToDigits(String(collected.total_pregnancies||"")))||0;
  const P=parseInt(hebrewToDigits(String(collected.total_births||"")))||0;
  const SA=Math.max(0,G-P);
  const NVD=parseInt(hebrewToDigits(String(collected.vaginal_births||"")))||0;
  const CS=parseInt(hebrewToDigits(String(collected.cs_births||"")))||0;
  if(G===0)return "G0";let f="G"+G;
  if(P>0){f+="-P"+P;if(SA>0)f+="-SA"+SA;if(NVD>0)f+="-NVD"+NVD;if(CS>0)f+="-CS"+CS;}
  else if(SA>0)f+="-SA"+SA;return f;
}
// ─── נירמול לשון מדוברת לרפואית ─────────────────────────
function medicalize(text){
  if(!text) return text;
  let t = text.trim();

  const numWords={"אחד":1,"אחת":1,"שני":2,"שתי":2,"שניים":2,"שתיים":2,"שלושה":3,"שלוש":3,"ארבעה":4,"ארבע":4,"חמישה":5,"חמש":5,"ששה":6,"שש":6,"שבעה":7,"שבע":7,"שמונה":8,"תשעה":9,"תשע":9,"עשרה":10,"עשר":10};

  // ביטויי גוף ראשון -> שלישי / פעיל -> סביל
  const replacements = [
    [/^עשו לי\s+/, "נעשה "],
    [/^נעשה לי\s+/, "נעשה "],
    [/^ביצעו לי\s+/, "בוצע "],
    [/^בוצע לי\s+/, "בוצע "],
    [/אני מטופלת על ידי\s*/g, "מטופלת על ידי "],
    [/אני מטופלת\s*/g, "מטופלת "],
    [/אני לוקחת\s+/g, "נוטלת "],
    [/אני נוטלת\s+/g, "נוטלת "],
    [/^יש לי\s+/, ""],
    [/^הרגשתי\s+/, "מדווחת על "],
    [/^אני מרגישה\s+/, "מדווחת על "],
    [/^אני סובלת מ\s*/, "סובלת מ"],
    [/כבר ש?ידוע לי\s*שנים\s*/, "ידוע כרוני, "],
    [/כבר ידוע\s*שנים\s*/, "ידוע כרוני, "],
    [/כואב לי\s*/g, "כאבים "],
    [/כואבת לי\s*/g, "כאבים "],
    [/כואבים לי\s*/g, "כאבים "],
    [/אני מדממת\s*/g, "מדממת "],
    [/יש לי דימום\s+/g, "דימום "],
    [/^יש לי דימום$/, "דימום"],
  ];
  replacements.forEach(([pat,rep])=>{ t = t.replace(pat, rep); });

  // ביטויי אי-ידיעה -> "לא ידוע/ה ..."
  if(/^לא\s+ש?ידוע\s+לי/.test(t)) t = "לא ידועה רגישות";
  else if(/^לא\s+יודעת/.test(t)) t = "לא ידוע";
  else if(/^אין\s+ש?ידוע\s+לי/.test(t)) t = "אין רגישות ידועה";

  // הערכות מספריות לא מדויקות (גם במילים): "חמישה מילימטר משהו כזה" -> "כ-5 מילימטר לערך"
  const numWordsPattern = Object.keys(numWords).join("|");
  const sizeRegex = new RegExp("(\\d+(\\.\\d+)?|"+numWordsPattern+")\\s*(מ\"מ|מ''מ|מילימטר|ס\"מ|סנטימטר)?\\s*(משהו כזה|בערך|בקירוב|לערך|פחות או יותר)", "g");
  t = t.replace(sizeRegex, (m, num, _d, unit) => {
    const n = numWords[num] !== undefined ? numWords[num] : num;
    return "כ-"+n+(unit?" "+unit:"")+" לערך";
  });

  t = t.replace(/^בערך\s+/, "כ-");
  t = t.replace(/^בסביבות\s+/, "כ-");

  // "משהו כזה" / "ככה" בודד בסוף משפט -> הסר
  t = t.replace(/\s*(משהו כזה|ככה|וכאלה)\s*$/, "");

  // "בגלל X" / "בשל X" / "עקב X" -> X
  t = t.replace(/^(בגלל|בשל|עקב)\s+ה?/, "");

  // המרת תאריך מילולי לפורמט אחיד אם זה תאריך מילולי מובהק (חודש בעברית)
  const monthsHeb = {"ינואר":1,"פברואר":2,"מרץ":3,"אפריל":4,"מאי":5,"יוני":6,"יולי":7,"אוגוסט":8,"ספטמבר":9,"אוקטובר":10,"נובמבר":11,"דצמבר":12};
  const dateMatch = t.match(/^(\d{1,2})\s+(ל)?(ינואר|פברואר|מרץ|אפריל|מאי|יוני|יולי|אוגוסט|ספטמבר|אוקטובר|נובמבר|דצמבר)\s+(\d{4})$/);
  if(dateMatch){
    const day=dateMatch[1].padStart(2,"0");
    const month=String(monthsHeb[dateMatch[3]]).padStart(2,"0");
    t = day+"/"+month+"/"+dateMatch[4];
  }

  // נקה רווחים כפולים
  // תיקוני זיהוי שגוי נפוצים
  t = t.replace(/החתמות/g, "הכתמות");
  t = t.replace(/החתמה/g, "הכתמה");

  t = t.replace(/\s{2,}/g," ").trim();

  return t;
}

function buildNarr(){
  const c=collected,secs=[];
  secs.push({title:"פרטים אישיים",text:[c.name,c.id?"ת.ז. "+c.id:""].filter(Boolean).join(", ")+"."});
  let gen=[];
  if(c.age)gen.push("גיל: "+c.age);
  if(c.has_children==="כן")gen.push("ילדים: "+c.children_count);
  else if(c.has_children==="לא")gen.push("ללא ילדים");
  if(c.meds_list)gen.push("תרופות קבועות: "+medicalize(c.meds_list));
  else if(c.takes_meds&&c.takes_meds!=="כן"&&c.takes_meds!=="לא")gen.push("תרופות קבועות: "+c.takes_meds);
  else if(c.takes_meds==="לא")gen.push("ללא תרופות קבועות");
  if(c.allergies_detail)gen.push("רגישות: "+medicalize(c.allergies_detail));
  else if(c.allergies&&c.allergies!=="כן"&&c.allergies!=="לא")gen.push("רגישות: "+c.allergies);
  else if(c.allergies==="לא")gen.push("ללא רגישויות ידועות");
  if(c.surgeries_detail)gen.push("ניתוחים קודמים: "+medicalize(c.surgeries_detail));
  else if(c.prev_surgeries&&c.prev_surgeries!=="כן"&&c.prev_surgeries!=="לא")gen.push("ניתוחים קודמים: "+c.prev_surgeries);
  else if(c.prev_surgeries==="לא")gen.push("ללא ניתוחים קודמים");
  if(c.family_cancer_detail){let fc="היסטוריה משפחתית אונקולוגית: "+medicalize(c.family_cancer_detail);if(c.genetic_workup)fc+=", בירור גנטי: "+medicalize(c.genetic_workup);gen.push(fc);}
  else if(c.family_cancer==="לא")gen.push("ללא היסטוריה משפחתית אונקולוגית ידועה");
  if(c.thrombosis_detail)gen.push("היסטוריה של קרישיות: "+medicalize(c.thrombosis_detail));
  else if(c.thrombosis==="לא")gen.push("ללא היסטוריה של קרישיות");
  secs.push({title:"רקע כללי",text:gen.join(". ")+"."});
  let gynLines=[];
  // נוסחה מיילדותית
  if(!isMinor()){
    gynLines.push(buildObs());
    if(c.has_children==="לא"&&parseInt(c.total_pregnancies)>0)gynLines.push("ללא ילדים חיים");
  }
  // מחזורים
  if(c.had_period_before==="לא")gynLines.push("מעולם לא קיבלה מחזור (אמנוריאה ראשונית)");
  else if(c.had_period_before==="כן"&&c.cycle_regular==="ללא מחזור")gynLines.push("הפסקת מחזור (אמנוריאה משנית)");
  if(c.cycle_regular==="לאחר גיל המעבר"){
    let pm="לאחר גיל המעבר";
    if(c.menopause_duration)pm+=", ללא מחזור "+c.menopause_duration;
    if(c.postmeno_bleeding==="כן")pm+=", דיווח על דימום פוסט-מנופאוזלי";
    else if(c.postmeno_bleeding==="לא")pm+=", ללא דימום";
    gynLines.push(pm);
  } else if(c.cycle_regular==="ללא מחזור"){
    gynLines.push("ללא מחזור");
  } else if(c.cycle_regular){
    let reg;
    if(c.cycle_regular==="כן, סדירים") reg="מחזור סדיר";
    else if(c.cycle_regular==="לא סדירים") reg="מחזור לא סדיר";
    else if(c.cycle_regular==="לא תמיד") reg="מחזור לא סדיר לגמרי";
    else reg="מחזור "+c.cycle_regular;
    const intv=c.cycle_interval_desc||c.cycle_interval;
    const parts=[reg];
    if(intv)parts.push(intv);
    if(c.cycle_duration)parts.push("נמשך "+c.cycle_duration);
    gynLines.push(parts.join(", ")+".");
    gynLines.push("דימום בין-וסתי: "+(c.intermenstrual_bleeding||"לא ידוע")+".");
    gynLines.push("כאבי וסת: "+(c.dysmenorrhea||"לא ידוע")+".");
    if(c.pain_period_related) gynLines.push("כאב קשור למחזור: "+c.pain_period_related+".");
    if(c.pain_before_period) gynLines.push("תחילת כאב: "+c.pain_before_period+".");
    if(c.pain_location) gynLines.push("מיקום כאב: "+c.pain_location+".");
    if(c.pain_character) gynLines.push("אופי כאב: "+c.pain_character+".");
    if(c.pain_aggravating) gynLines.push("מחמיר: "+medicalize(c.pain_aggravating)+".");
    if(c.dyspareunia&&c.dyspareunia!=="לא פעילה מינית") gynLines.push("כאב ביחסים: "+c.dyspareunia+".");
    if(c.bowel_changes_period==="כן") gynLines.push("שינויים ביציאות בווסת: כן.");
    gynLines.push("LMP: "+(c.lmp||"לא ידוע")+".");
  }
  // אמצעי מניעה / HRT
  if(c.contraception==="כן"){
    if(c.hrt_type){let h="טיפול הורמונלי חליפי: "+c.hrt_type;if(c.hrt_duration)h+=", מזה "+c.hrt_duration;gynLines.push(h+".");}
    else{let ct=c.contraception_type||"";if(c.pill_name)ct+=" ("+c.pill_name+")";if(c.iud_duration)ct+=", מזה "+c.iud_duration;gynLines.push("אמצעי מניעה: "+ct+".");}
    if(c.hrt_past) gynLines.push("טיפול הורמונלי בעבר: "+medicalize(c.hrt_past)+".");
  } else if(c.contraception==="לא"){
    gynLines.push(c.cycle_regular==="לאחר גיל המעבר"?"ללא HRT.":"ללא אמצעי מניעה.");
  }
  // פאפ
  if(c.last_pap)gynLines.push("פאפ אחרון: "+c.last_pap+".");
  // רקע גינקולוגי ידוע
  if(c.gyn_history&&!c.gyn_history.includes("אין"))gynLines.push("רקע גינקולוגי: "+medicalize(c.gyn_history)+".");
  secs.push({title:"רקע גינקולוגי",text:gynLines.join("\n")});
  const bld=(pfx,label)=>{
    const lines=[];
    if(label)lines.push("תלונה עיקרית: "+label+".");
    // ניתוח / היסטרוסקופיה
    if(c[pfx+"surgery_reason"]){
      let sr=c[pfx+"surgery_reason"];
      const stdReasons=["פוליפ","מיומה","רירית מעובה","שארית רקמה","ציסטה בשחלה","אנדומטריוזיס","בעיית פוריות","צניחת אברי האגן","בדיקה ואבחון","אחר"];
      if(!stdReasons.includes(sr)) sr=medicalize(sr.replace(/^בגלל\s+/,"").replace(/^בשל\s+/,"").replace(/^עקב\s+/,""));
      lines.push("הופנתה ל/לצורך: "+sr+".");
    }
    // פוריות
    if(c[pfx+"fertility_duration"]){
      lines.push("משך ניסיונות הריון: "+c[pfx+"fertility_duration"]+".");
      if(c[pfx+"fertility_workup"])lines.push("בירור פוריות: "+c[pfx+"fertility_workup"]+".");
      if(c[pfx+"fertility_treatment"]==="כן"&&c[pfx+"fertility_treatment_details"])lines.push("טיפולים שבוצעו: "+c[pfx+"fertility_treatment_details"]+".");
      else if(c[pfx+"fertility_treatment"]==="לא")lines.push("ללא טיפולי פוריות.");
    } else {
      // תלונות אחרות
      if(c[pfx+"duration"])lines.push("משך: "+c[pfx+"duration"]+".");
      if(c[pfx+"bleeding_amount"])lines.push("כמות דימום: "+c[pfx+"bleeding_amount"]+".");
      if(c[pfx+"pain_location"])lines.push("מיקום כאב: "+c[pfx+"pain_location"]+".");
      if(c[pfx+"pain_pattern"])lines.push("אופי כאב: "+c[pfx+"pain_pattern"]+".");
      if(c[pfx+"pain_character"])lines.push("תכונות כאב: "+c[pfx+"pain_character"]+".");
      if(c[pfx+"pain_cycle"])lines.push("קשר לווסת: "+c[pfx+"pain_cycle"]+".");
      if(c[pfx+"pain_dyspareunia"])lines.push("דיספרוניה: "+c[pfx+"pain_dyspareunia"]+".");
      if(c[pfx+"endo_workup"])lines.push("בירור אנדומטריוזיס: "+c[pfx+"endo_workup"]+".");
      if(c[pfx+"history"])lines.push(medicalize(c[pfx+"history"])+".");
      if(c[pfx+"workup"]&&c[pfx+"workup"]!=="לא"){
        let wu=c[pfx+"workup"];
        // אם זה תשובה חופשית (לא מהאפשרויות הסטנדרטיות) — נרמל
        const stdWorkup=["כן, אצל רופאת משפחה","כן, אצל גינקולוגית","כן, בוצעו בדיקות"];
        if(!stdWorkup.includes(wu)) wu=medicalize(wu.replace(/^כן,?\s*/,""));
        lines.push("בירור קודם: "+wu+".");
      }
      if(c[pfx+"workup_findings"])lines.push("ממצאים: "+medicalize(c[pfx+"workup_findings"])+".");
      if(c[pfx+"pap_status"])lines.push("פאפ: "+c[pfx+"pap_status"]+".");
      if(c[pfx+"hpv_status"])lines.push("פפילומה: "+c[pfx+"hpv_status"]+".");
    }
    return lines.join("\n");};
  secs.push({title:"תלונה עיקרית",text:bld("c1_",c.main_complaint)});
  if(c.extra_complaint)secs.push({title:"תלונה נוספת: "+c.extra_complaint,text:bld("c2_",null)});
  if(c.extra_notes)secs.push({title:"הערות",text:medicalize(c.extra_notes)});
  if(claudeMessages.length>0)secs.push({title:"שיחה מורחבת",text:claudeMessages.map(m=>(m.role==="assistant"?"🩺 ":"👤 ")+m.content).join("\n")});
  return secs;
}
function showSummary(){
  summaryDone=true;
  msgsEl.style.display="none";optsEl.style.display="none";chatInput.style.display="none";
  summaryView.classList.add("active");
  renderSummary(buildNarr());
}

function renderSummary(sections){
  summaryContent.innerHTML="";summaryText="סיכום אנמנזה\n\n";
  sections.forEach(s=>{
    const div=document.createElement("div");div.className="sum-section";
    const h=document.createElement("h3");h.textContent=s.title;div.appendChild(h);
    const p=document.createElement("p");p.textContent=s.text;div.appendChild(p);
    summaryContent.appendChild(div);
    summaryText+="── "+s.title+" ──\n"+s.text+"\n\n";
  });
}
function closeSummary(){summaryView.classList.remove("active");msgsEl.style.display="flex";optsEl.style.display="flex";chatInput.style.display="flex";}
function sendEmail(){
  const btn=document.getElementById("email-btn");
  btn.textContent="⏳ שולחת...";btn.disabled=true;
  const narr=buildNarr();
  const get=title=>{const s=narr.find(x=>x.title===title);return s?s.text:"";};
  const time=new Date().toLocaleString("he-IL");
  emailjs.send("VAP","template_3xd2fg9",{
    time,
    personal:get("פרטים אישיים"),
    general:get("רקע כללי"),
    gynecological:get("רקע גינקולוגי"),
    complaint:narr.filter(s=>s.title.includes("תלונה")).map(s=>s.title+": "+s.text).join("\n"),
    notes:get("הערות")||"—"
  }).then(()=>{clearSession();btn.textContent="✓ נשלח!";btn.style.background="#27ae60";setTimeout(()=>{btn.textContent="📧 שליחה למייל";btn.disabled=false;btn.style.background="";},3000);
  }).catch(()=>{btn.textContent="✗ שגיאה";btn.disabled=false;setTimeout(()=>btn.textContent="📧 שליחה למייל",3000);});
}
function copySummary(){
  navigator.clipboard.writeText(summaryText)
    .then(()=>{const btn=document.querySelector(".sum-btn.primary");btn.textContent="✓ הועתק!";setTimeout(()=>btn.textContent="📋 העתקה",2000);})
    .catch(()=>alert(summaryText));
}

// ─── אזהרה לפני יציאה (דסקטופ/אנדרואיד) ────────────────
window.addEventListener("beforeunload", function(e){
  if(!chatStarted || summaryDone) return;
  e.preventDefault();
  e.returnValue = "";
});

// ─── שחזור session לאחר ריפרש ────────────────────────────
document.addEventListener("DOMContentLoaded", function(){
  const saved = loadSession();
  if(!saved) return;
  const ms = document.getElementById("mode-screen");
  if(!ms) return;
  const resumeDiv = document.createElement("div");
  resumeDiv.style.cssText = "background:#e6f7f1;border:1.5px solid #1D9E75;border-radius:14px;padding:14px 18px;text-align:center;direction:rtl;width:100%;margin-bottom:8px;";
  resumeDiv.innerHTML =
    '<div style="font-size:14px;font-weight:600;color:#0F6E56;margin-bottom:6px;">⚠️ נמצאה שאלה לא גמורה</div>' +
    '<div style="font-size:12px;color:#555;margin-bottom:12px;">ניתן להמשיך מהנקודה האחרונה שנשמרה</div>' +
    '<div style="display:flex;gap:8px;justify-content:center;">' +
    '<button id="resume-btn" style="background:#1D9E75;color:#fff;border:none;border-radius:20px;padding:8px 20px;font-size:13px;cursor:pointer;font-family:inherit;">המשיכי מאיפוה שהפסקת</button>' +
    '<button id="restart-btn" style="background:#fff;color:#666;border:1px solid #ddd;border-radius:20px;padding:8px 20px;font-size:13px;cursor:pointer;font-family:inherit;">התחלה מחדש</button>' +
    '</div>';
  ms.insertBefore(resumeDiv, ms.firstChild);

  document.getElementById("restart-btn").onclick = function(){
    clearSession();
    resumeDiv.remove();
  };

  document.getElementById("resume-btn").onclick = function(){
    const data = loadSession();
    if(!data){ resumeDiv.remove(); return; }
    collected = data.collected;
    resumeDiv.remove();
    chatStarted = true;
    summaryDone = true;
    // הסתר modeScreen
    document.getElementById("mode-screen").style.display = "none";
    // הצג chat-screen
    const cs = document.getElementById("chat-screen");
    cs.style.display = "flex";
    cs.classList.add("active");
    // הסתר כפתור חזרה פנימי — אין steps בסיכום ישיר
    const bb = document.getElementById("back-btn");
    if(bb) bb.style.display = "none";
    const bbar = document.getElementById("back-bar");
    if(bbar) bbar.style.display = "none";
    // הסתר כל רכיבי הצ'אט
    ["messages","options-area","input-area","progress-bar","avatar-area"].forEach(function(id){
      const el = document.getElementById(id);
      if(el) el.style.display = "none";
    });
    // הצג summary-view
    const sv = document.getElementById("summary-view");
    if(sv){
      sv.style.display = "flex";
      sv.classList.add("active");
    }
    history.pushState({inChat:true}, "");
    history.pushState({inChat:true}, "");
    // render בmicrotask — אחרי שה-DOM מתעדכן
    setTimeout(function(){ renderSummary(buildNarr()); }, 0);
  };
});

// ─── חסימת כפתור חזור של הדפדפן ─────────────────────────
window.addEventListener("popstate", function(e){
  // אם השאלון לא התחיל — ייתכן שהגענו מריפרש עם session שמורה
  if(!chatStarted){
    const saved = loadSession();
    if(saved){
      // יש session — נחזיר state ונשאיר את מסך ה-resume גלוי
      history.pushState({inChat:true}, "");
    }
    return;
  }
  if(summaryDone){
    // הסיכום מוצג — נשאר בסיכום
    history.pushState({inChat:true}, "");
    return;
  }
  // באמצע השאלון — נחסום ונציג toast
  history.pushState({inChat:true}, "");
  showBackWarning();
});

function showBackWarning(){
  let toast = document.getElementById("back-toast");
  if(!toast){
    toast = document.createElement("div");
    toast.id = "back-toast";
    toast.style.cssText = "position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:9999;text-align:center;direction:rtl;max-width:280px;line-height:1.5;box-shadow:0 4px 16px rgba(0,0,0,0.3);";
    document.body.appendChild(toast);
  }
  toast.textContent = "כדי לחזור לשאלה הקודמת — השתמשי בכפתור ← בראש המסך";
  toast.style.opacity = "1";
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { toast.style.opacity = "0"; }, 3000);
}
